<h2>📘 Assignments</h2>

<p *ngIf="loading">Loading assignments...</p>

<p *ngIf="!loading && assignments.length === 0">
  No assignments available
</p>

<div *ngFor="let a of assignments" class="assignment-card">
  <h3>{{ a.title }}</h3>
  <p>{{ a.description }}</p>
  <small>
    👩‍🏫 {{ a.faculty }} · Due: {{ a.dueDate | date:'mediumDate' }}
  </small>
</div>
