<h2>📢 Announcements</h2>

<p *ngIf="loading">Loading announcements...</p>

<p *ngIf="!loading && announcements.length === 0">
  No announcements available
</p>

<div *ngFor="let a of announcements" class="announcement-card">
  <h3>{{ a.title }}</h3>
  <p>{{ a.message }}</p>

  <small>
    👩‍🏫 {{ a.faculty }} ·
    {{ a.createdAt | date:'medium' }}
  </small>
</div>
