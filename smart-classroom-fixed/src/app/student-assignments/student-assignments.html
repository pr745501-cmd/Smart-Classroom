<div class="viewport-wrapper">
  <div class="mesh-gradient"></div>

  <div class="main-content">
    <header class="ultra-header">
      <div class="header-left">
        <div class="brand-glyph">
          <div class="glyph-inner"></div>
        </div>
        <div class="brand-text">
          <h1>Workplace <span>Assignments</span></h1>
          <p>You have <b>{{ filteredAssignments.length }}</b> active tasks in your queue</p>
        </div>
      </div>

      <div class="header-right">
        <div class="search-glass">
          <input type="text" placeholder="Quick find..." [(ngModel)]="searchText" />
          <kbd class="hotkey">/</kbd>
        </div>
      </div>
    </header>

    <div class="bento-container">
      <div *ngIf="loading" class="grid-layout">
        <div *ngFor="let i of [1,2,3,4,5,6]" class="skeleton-shimmer"></div>
      </div>

      <div *ngIf="!loading" class="grid-layout">
        <div *ngFor="let a of filteredAssignments" class="crystal-card">
          <div class="refraction-layer"></div>
          
          <div class="card-header">
            <span class="subject-pill">IT • BCA</span>
            <div class="status-indicator">
              <span class="pulse-dot"></span>
              ACTIVE
            </div>
          </div>

          <div class="card-body">
            <h3>{{ a.title }}</h3>
            <p class="description-text">{{ a.description }}</p>
            
            <div class="faculty-row">
              <div class="faculty-avatar">{{ a.faculty.charAt(6) }}</div>
              <div class="faculty-meta">
                <span class="label">Assigned By</span>
                <span class="name">{{ a.faculty }}</span>
              </div>
            </div>
          </div>

          <div class="card-footer">
            <div class="deadline">
              <span class="icon">📅</span>
              <span class="date">{{ a.dueDate | date:'dd MMM, yyyy' }}</span>
            </div>
            
            <a *ngIf="a.fileUrl" [href]="a.fileUrl" target="_blank" class="cyber-btn">
              <span>Launch Resource</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
