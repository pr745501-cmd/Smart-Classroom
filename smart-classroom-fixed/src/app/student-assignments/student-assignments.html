<div class="min-h-screen bg-slate-100 p-8">

  <!-- HEADER -->
  <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8 gap-4">

    <h1 class="text-3xl font-bold text-slate-800">
      📝 Assignments
    </h1>

    <!-- SEARCH -->
    <input
      type="text"
      placeholder="Search assignment..."
      [(ngModel)]="searchText"
      class="px-4 py-2 rounded-lg border
             focus:outline-none focus:ring-2
             focus:ring-blue-400 w-full md:w-64"
    />

  </div>

  <!-- SKELETON -->
  <div
    *ngIf="loading"
    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"
  >
    <div
      *ngFor="let i of [1,2,3,4,5,6]"
      class="animate-pulse bg-white rounded-xl p-5 shadow"
    >
      <div class="h-5 bg-gray-200 rounded mb-3"></div>
      <div class="h-4 bg-gray-200 rounded mb-2"></div>
      <div class="h-4 bg-gray-200 rounded w-2/3"></div>
    </div>
  </div>

  <!-- EMPTY -->
  <p *ngIf="!loading && filteredAssignments.length === 0"
     class="text-gray-500">
     No assignments found
  </p>

  <!-- ASSIGNMENTS GRID -->
  <div
    *ngIf="!loading"
    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"
  >

    <div
      *ngFor="let a of filteredAssignments"
      class="bg-white rounded-xl p-5 shadow
             hover:shadow-xl hover:-translate-y-1
             transition-all duration-300"
    >

      <!-- TITLE -->
      <h3 class="font-semibold text-lg text-slate-800">
        {{ a.title }}
      </h3>

      <!-- DESCRIPTION -->
      <p class="text-gray-600 text-sm mt-1 mb-3 line-clamp-3">
        {{ a.description }}
      </p>

      <!-- META -->
      <p class="text-sm text-gray-500">
        👨‍🏫 {{ a.faculty }}
      </p>

      <p class="text-sm text-gray-500 mb-4">
        📅 Due: {{ a.dueDate | date:'mediumDate' }}
      </p>

      <!-- FILE -->
      <a
        *ngIf="a.fileUrl"
        [href]="a.fileUrl"
        target="_blank"
        class="block text-center
               bg-blue-600 text-white py-2
               rounded-lg
               hover:bg-blue-700
               transition"
      >
        Open Resource
      </a>

    </div>

  </div>

</div>
