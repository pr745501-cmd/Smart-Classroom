<div class="page-wrapper">

  <button class="back-btn" (click)="goBack()">&#8592; Faculty</button>

  <div class="center-wrap">
    <div class="live-card">

      <div class="live-icon">&#127909;</div>
      <h2 class="live-card-title">Live Class Control</h2>
      <p class="live-card-sub">Start or end a live session for your students</p>

      <!-- Status Indicator -->
      <div class="status-indicator" [class.live]="isLive" [class.offline]="!isLive">
        <span *ngIf="isLive" class="live-pulse"></span>
        <span *ngIf="!isLive" class="offline-dot"></span>
        {{ isLive ? 'Class is Live' : 'No Active Session' }}
      </div>

      <!-- Form Fields -->
      <div class="field-group">
        <label>Class Title</label>
        <input type="text" [(ngModel)]="title" placeholder="e.g. Introduction to Angular">
      </div>

      <div class="field-group">
        <label>Meeting Link</label>
        <input type="text" [(ngModel)]="link" placeholder="https://meet.google.com/...">
      </div>

      <!-- Start Button -->
      <button class="btn-start" [class.active-pulse]="isLive" (click)="start()" [disabled]="loading">
        {{ loading ? 'Starting...' : isLive ? '🔴 Class is Live' : '🟢 Start Live Class' }}
      </button>

      <!-- End Button -->
      <button class="btn-end" (click)="end()">
        &#9209; End Class
      </button>

    </div>
  </div>

</div>
