<div class="page-wrapper">

  <button class="back-btn" (click)="goBack()">← Dashboard</button>

  <div class="center-area">

    <!-- NO LIVE CLASS -->
    <div *ngIf="!liveClass" class="no-class-card">
      <span class="pulse-icon">📡</span>
      <h2>No Live Class Right Now</h2>
      <p>We'll notify you when a class starts. Check back soon.</p>
    </div>

    <!-- LIVE CLASS ACTIVE -->
    <div *ngIf="liveClass" class="live-class-card">
      <div class="live-badge">
        <span class="live-dot"></span>
        LIVE
      </div>

      <h2>{{ liveClass.title }}</h2>
      <p class="faculty-line">👨‍🏫 {{ liveClass.facultyName }}</p>

      <a [href]="liveClass.meetingLink" target="_blank" class="join-btn">
        Join Class →
      </a>
    </div>

  </div>

</div>
