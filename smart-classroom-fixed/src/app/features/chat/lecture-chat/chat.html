<div class="flex flex-col h-[600px] w-full max-w-2xl mx-auto bg-white/90 backdrop-blur-xl border border-slate-200 rounded-[2.5rem] shadow-[0_20px_50px_-12px_rgba(0,0,0,0.05)] overflow-hidden">
  
  <header class="px-8 py-6 bg-white border-b border-slate-100 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3">
      <div class="relative">
        <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-100">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
          </svg>
        </div>
        <span class="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-emerald-500 border-2 border-white rounded-full"></span>
      </div>
      <div>
        <h2 class="text-sm font-black text-slate-900 uppercase tracking-widest">Classroom Chat</h2>
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter italic">Live Session • BCA</p>
      </div>
    </div>
    
    <div class="flex gap-2">
      <div class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center border border-slate-100">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
      </div>
    </div>
  </header>

  <div class="flex-1 overflow-y-auto p-6 md:p-8 space-y-6 bg-slate-50/30" #scrollContainer>
    
    <div *ngFor="let m of messages; trackBy:trackMsg" 
         class="flex flex-col max-w-[85%] transition-all"
         [class.ml-auto]="m.senderName === user.name"
         [class.items-end]="m.senderName === user.name">

      <span *ngIf="m.senderName !== user.name" class="text-[10px] font-black text-slate-400 uppercase tracking-[0.15em] mb-1.5 ml-2">
        {{ m.senderName }}
      </span>

      <div class="relative px-5 py-3.5 rounded-[1.8rem] text-sm font-medium shadow-sm"
           [ngClass]="m.senderName === user.name 
            ? 'bg-indigo-600 text-white rounded-tr-none' 
            : 'bg-white text-slate-700 border border-slate-200 rounded-tl-none'">
        
        <p class="leading-relaxed">{{ m.message }}</p>

        <div class="text-[9px] mt-2 opacity-60 font-black uppercase tracking-tighter"
             [class.text-right]="m.senderName === user.name">
          {{ m.createdAt | date:'shortTime' }}
        </div>
      </div>
    </div>

    <div *ngIf="messages.length === 0" class="h-full flex flex-col items-center justify-center opacity-40">
      <div class="w-16 h-16 bg-slate-200 rounded-3xl mb-4"></div>
      <p class="text-[10px] font-black uppercase tracking-widest text-slate-400">No messages yet</p>
    </div>
  </div>

  <footer class="p-6 bg-white border-t border-slate-100 shrink-0">
    <div class="relative flex items-center gap-3 bg-slate-100/50 rounded-2xl p-2 border border-slate-200 focus-within:border-indigo-400 focus-within:bg-white transition-all">
      
      <input
        [(ngModel)]="message"
        placeholder="Type a message..."
        class="flex-1 bg-transparent border-none focus:ring-0 text-sm font-semibold text-slate-700 placeholder:text-slate-400 px-3"
        (keyup.enter)="sendMessage()"
      />

      <button (click)="sendMessage()" 
        class="bg-indigo-600 hover:bg-slate-900 text-white p-3 rounded-xl transition-all active:scale-90 shadow-lg shadow-indigo-100 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 translate-x-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
          <path d="M5 12h14M12 5l7 7-7 7" />
        </svg>
      </button>
    </div>
  </footer>

</div> ```
