<div class="split-viewport">
  <div class="brand-side">
    <div class="mesh-gradient"></div>
    <div class="brand-content">
      <div class="logo-badge">SC</div>
      <h1 class="hero-text">Smart <br><span>Classroom</span></h1>
      <p class="hero-sub">The next generation of academic management and digital collaboration.</p>
      
      <div class="feature-tag">
        <span class="pulse-dot"></span>
        Now with AI-Powered Insights
      </div>
    </div>
  </div>

  <div class="form-side">
    <div class="login-card glass-panel">
      <div class="form-header">
        <h2>Welcome Back</h2>
        <p>Enter your credentials to continue</p>
      </div>

      <form (ngSubmit)="login()" #loginForm="ngForm">
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" [(ngModel)]="email" name="email" placeholder="name@university.edu" required>
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox"> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary" [disabled]="loading">
          {{ loading ? 'Authenticating...' : 'Sign In' }}
        </button>
      </form>

      <p class="signup-prompt">
        Don't have an account? <a routerLink="/signup">Join for free</a>
      </p>
    </div>
  </div>
</div>
