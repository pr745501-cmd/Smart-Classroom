<div class="min-h-screen flex items-center justify-center bg-slate-100">

  <div class="bg-white p-10 rounded-xl shadow-lg text-center w-96">

    <h2 class="text-2xl font-bold text-orange-600 mb-4">
      ⏳ Account Pending Approval
    </h2>

    <p class="text-gray-600 mb-6">
      Your registration request has been sent to faculty.
      You will be able to login once approved.
    </p>

    <button
      (click)="checkStatus()"
      [disabled]="loading"
      class="w-full bg-blue-600 hover:bg-blue-700
             text-white py-2 rounded-lg transition"
    >
      {{ loading ? 'Checking...' : '🔄 Check Status' }}
    </button>

    <p *ngIf="message" class="text-sm text-gray-500 mt-4">
      {{ message }}
    </p>

  </div>

</div>
