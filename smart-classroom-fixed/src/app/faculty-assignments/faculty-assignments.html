<div class="page">

  <!-- HEADER -->
  <div class="header">
    <h2>📘 Faculty Assignments</h2>
    <p>Create and manage student assignments</p>
  </div>

  <!-- FORM CARD -->
  <div class="card">

    <h3>
      {{ editingAssignmentId ? 'Update Assignment' : 'Create Assignment' }}
    </h3>

    <div class="form-grid">

      <input
        type="text"
        placeholder="Assignment Title"
        [(ngModel)]="title">

      <input
        type="date"
        [(ngModel)]="dueDate">

      <input
        type="text"
        placeholder="File URL (optional)"
        [(ngModel)]="fileUrl">

      <textarea
        placeholder="Description"
        [(ngModel)]="description">
      </textarea>

    </div>

    <div class="actions">

      <button
        *ngIf="!editingAssignmentId"
        (click)="addAssignment()"
        class="btn primary">
        ➕ Add Assignment
      </button>

      <button
        *ngIf="editingAssignmentId"
        (click)="updateAssignment()"
        class="btn success">
        💾 Update Assignment
      </button>

      <button
        *ngIf="editingAssignmentId"
        (click)="resetForm()"
        class="btn gray">
        Cancel
      </button>

    </div>

  </div>

  <!-- LIST -->
  <h3 class="section-title">Your Assignments</h3>

  <div class="grid">

    <div
      *ngFor="let a of assignments"
      class="assignment-card">

      <h4>{{ a.title }}</h4>

      <p class="desc">{{ a.description }}</p>

      <p class="due">
        ⏰ Due: {{ a.dueDate | date }}
      </p>

      <a
        *ngIf="a.fileUrl"
        [href]="a.fileUrl"
        target="_blank"
        class="link">
        📥 Download File
      </a>

      <div class="card-actions">

        <button
          (click)="editAssignment(a)"
          class="btn outline">
          ✏ Edit
        </button>

        <button
          (click)="deleteAssignment(a._id)"
          class="btn danger">
          🗑 Delete
        </button>

      </div>

    </div>

  </div>

</div>
