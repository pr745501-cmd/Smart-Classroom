<div class="assignment-box">

  <h2>📘 Create Assignment</h2>

  <input type="text" placeholder="Title" [(ngModel)]="title">
  <textarea placeholder="Description" [(ngModel)]="description"></textarea>
  <input type="date" [(ngModel)]="dueDate">
  <input type="text" placeholder="File URL (optional)" [(ngModel)]="fileUrl">

  <button (click)="addAssignment()">➕ Add Assignment</button>

  <hr>

  <h3>📄 Your Assignments</h3>

  <div *ngFor="let a of assignments" class="card">
    <h4>{{ a.title }}</h4>
    <p>{{ a.description }}</p>
    <p><b>Due:</b> {{ a.dueDate | date }}</p>

    <a *ngIf="a.fileUrl" [href]="a.fileUrl" target="_blank">
      📥 Download
    </a>
  </div>

</div>
