<div class="min-h-screen bg-slate-100 p-8">

  <!-- Header -->
  <div class="flex items-center justify-between mb-8">
    <div>
      <h2 class="text-3xl font-bold text-slate-800">
        🎓 Enrolled Students
      </h2>
      <p class="text-slate-500">
        View all students registered in your course
      </p>
    </div>
  </div>

  <!-- Loader -->
  <div *ngIf="loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <div
      *ngFor="let i of [1,2,3,4,5,6]"
      class="animate-pulse bg-white p-6 rounded-xl shadow"
    >
      <div class="h-4 bg-gray-200 rounded w-1/2 mb-3"></div>
      <div class="h-3 bg-gray-200 rounded w-3/4 mb-2"></div>
      <div class="h-3 bg-gray-200 rounded w-1/3"></div>
    </div>
  </div>

  <!-- No Students -->
  <p
    *ngIf="!loading && students.length === 0"
    class="text-gray-500 text-center mt-10"
  >
    No students enrolled yet
  </p>

  <!-- Students Grid -->
  <div
    *ngIf="!loading && students.length > 0"
    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"
  >

    <div
      *ngFor="let s of students"
      class="bg-white rounded-xl p-6 shadow
             hover:shadow-xl
             hover:-translate-y-1
             transition-all duration-300"
    >

      <!-- Avatar -->
      <div class="flex items-center gap-4 mb-4">
        <div
          class="w-12 h-12 rounded-full bg-blue-100 text-blue-600
                 flex items-center justify-center font-bold text-lg">
          {{ s.name[0] }}
        </div>

        <div>
          <h3 class="font-semibold text-lg text-slate-800">
            {{ s.name }}
          </h3>
          <p class="text-sm text-slate-500">
            Student
          </p>
        </div>
      </div>

      <!-- Details -->
      <div class="text-sm text-slate-600 space-y-2">
        <p>📧 {{ s.email }}</p>
        <p>🎓 Course: {{ s.course || 'Not assigned' }}</p>
      </div>

    </div>

  </div>

</div>
