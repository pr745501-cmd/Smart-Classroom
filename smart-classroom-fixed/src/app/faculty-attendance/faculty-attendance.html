<div class="min-h-screen bg-slate-100 p-8">

  <!-- Header -->
  <div class="flex items-center justify-between mb-8">
    <div>
      <h2 class="text-3xl font-bold text-slate-800">
        📊 Mark Attendance
      </h2>
      <p class="text-slate-500">
        Select present / absent and submit
      </p>
    </div>

    <!-- Date -->
    <div class="bg-white p-3 rounded-xl shadow">
      <label class="text-sm text-slate-600 block mb-1">
        Attendance Date
      </label>
      <input
        type="date"
        [(ngModel)]="date"
        class="border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
      >
    </div>
  </div>

  <!-- Loading Skeleton -->
  <div *ngIf="loading"
       class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <div
      *ngFor="let i of [1,2,3,4,5,6]"
      class="animate-pulse bg-white p-5 rounded-xl shadow"
    >
      <div class="h-4 bg-gray-200 rounded w-2/3 mb-3"></div>
      <div class="h-3 bg-gray-200 rounded w-1/3"></div>
    </div>
  </div>

  <!-- No Students -->
  <p *ngIf="!loading && students.length === 0"
     class="text-center text-gray-500 mt-10">
    No enrolled students
  </p>

  <!-- Student Cards -->
  <div
    *ngIf="!loading && students.length > 0"
    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"
  >

    <div
      *ngFor="let s of students"
      class="bg-white rounded-xl p-5 shadow
             hover:shadow-xl transition">

      <div class="flex items-center justify-between">

        <!-- Student Info -->
        <div class="flex items-center gap-4">
          <div
            class="w-11 h-11 rounded-full bg-blue-100 text-blue-600
                   flex items-center justify-center font-bold text-lg">
            {{ s.name[0] }}
          </div>

          <div>
            <h3 class="font-semibold text-slate-800">
              {{ s.name }}
            </h3>
            <p class="text-sm text-slate-500">Student</p>
          </div>
        </div>

        <!-- Toggle -->
        <label class="relative inline-flex items-center cursor-pointer">
          <input
            type="checkbox"
            [(ngModel)]="s.present"
            class="sr-only peer">

          <div
            class="w-11 h-6 bg-red-300 peer-focus:outline-none
                   rounded-full peer
                   peer-checked:bg-green-500
                   after:content-['']
                   after:absolute after:top-[2px]
                   after:left-[2px]
                   after:bg-white after:rounded-full
                   after:h-5 after:w-5 after:transition-all
                   peer-checked:after:translate-x-full">
          </div>
        </label>

      </div>

      <!-- Status -->
      <p class="mt-3 text-sm"
         [class.text-green-600]="s.present"
         [class.text-red-600]="!s.present">
        {{ s.present ? 'Present' : 'Absent' }}
      </p>

    </div>

  </div>

  <!-- Submit Button -->
  <div class="mt-10 flex justify-end">

    <button
      (click)="submitAttendance()"
      [disabled]="students.length === 0 || submitting"
      class="px-8 py-3 rounded-xl text-white font-semibold
             bg-blue-600 hover:bg-blue-700
             disabled:opacity-50 disabled:cursor-not-allowed
             transition"
    >
      {{ submitting ? 'Submitting...' : 'Submit Attendance' }}
    </button>

  </div>

</div>
