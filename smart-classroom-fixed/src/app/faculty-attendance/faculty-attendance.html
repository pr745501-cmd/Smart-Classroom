<h2>📊 Mark Attendance</h2>

<label>
  Date:
  <input type="date" [(ngModel)]="date">
</label>

<p *ngIf="loading">Loading students...</p>

<p *ngIf="!loading && students.length === 0">
  No enrolled students
</p>

<div *ngFor="let s of students">
  <label>
    <input type="checkbox" [(ngModel)]="s.present">
    {{ s.name }}
  </label>
</div>

<br>

<button
  (click)="submitAttendance()"
  [disabled]="students.length === 0 || submitting">
  {{ submitting ? 'Submitting...' : 'Submit Attendance' }}
</button>
