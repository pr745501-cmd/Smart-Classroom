<div class="box">
  <h2>📢 Create Announcement</h2>

  <input
    type="text"
    placeholder="Title"
    [(ngModel)]="title"
  >

  <textarea
    placeholder="Message"
    [(ngModel)]="message">
  </textarea>

  <button (click)="addAnnouncement()">
    📤 Post Announcement
  </button>

  <hr>

  <h3>📄 Your Announcements</h3>

  <div *ngFor="let a of announcements" class="announcement-card">
    <h4>{{ a.title }}</h4>
    <p>{{ a.message }}</p>

    <small>
      {{ a.createdAt | date:'medium' }}
    </small>
  </div>
</div>
