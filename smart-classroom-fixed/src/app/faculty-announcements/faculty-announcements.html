<div class="min-h-screen bg-[#fcfcfd] font-sans text-slate-900 selection:bg-orange-100 selection:text-orange-700 py-16 px-4">
  
  <div class="fixed top-0 right-0 w-[600px] h-[600px] bg-orange-50/40 blur-[130px] rounded-full -z-10"></div>
  <div class="fixed bottom-0 left-0 w-[400px] h-[400px] bg-indigo-50/30 blur-[100px] rounded-full -z-10"></div>

  <div class="max-w-4xl mx-auto">
    
    <header class="mb-14 flex flex-col md:flex-row md:items-end justify-between gap-6">
      <div>
        <div class="flex items-center gap-2 mb-3">
          <span class="w-2 h-2 rounded-full bg-orange-500 shadow-[0_0_10px_rgba(249,115,22,0.5)]"></span>
          <span class="text-[11px] font-black uppercase tracking-[0.3em] text-slate-400">Public Relations</span>
        </div>
        <h1 class="text-5xl font-black tracking-tighter text-slate-900">
          Faculty <span class="text-orange-600">Voice.</span>
        </h1>
        <p class="text-slate-500 mt-3 font-medium text-lg">
          Broadcasting as <span class="text-slate-900 font-bold underline decoration-orange-200 decoration-4 underline-offset-4">{{ facultyName }}</span>
        </p>
      </div>
      
      <div class="hidden md:block text-right">
        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Global Status</p>
        <p class="text-sm font-bold text-emerald-600 flex items-center justify-end gap-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5L20 7" /></svg>
          Connected
        </p>
      </div>
    </header>

    <section class="mb-20">
      <div class="bg-white border border-slate-200 rounded-[2.5rem] p-8 md:p-10 shadow-[0_30px_60px_-15px_rgba(0,0,0,0.05)] transition-all hover:shadow-[0_30px_60px_-10px_rgba(0,0,0,0.08)]">
        <div class="flex items-center gap-3 mb-8">
          <div class="w-10 h-10 rounded-full bg-orange-100 flex items-center justify-center text-orange-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z" /></svg>
          </div>
          <h3 class="text-lg font-black text-slate-800">{{ editingId ? 'Update Notice' : 'Draft Announcement' }}</h3>
        </div>

        <div class="space-y-6">
          <input type="text" [(ngModel)]="title" 
            class="w-full text-2xl font-black placeholder:text-slate-200 border-none focus:ring-0 p-0 outline-none text-slate-900" 
            placeholder="Important Headline...">

          <textarea [(ngModel)]="message" rows="3"
            class="w-full text-slate-500 placeholder:text-slate-200 border-none focus:ring-0 p-0 outline-none resize-none text-lg font-medium leading-relaxed"
            placeholder="Share the details with your students..."></textarea>

          <div class="flex items-center justify-between pt-6 border-t border-slate-50">
            <span class="text-[10px] font-black text-slate-300 uppercase tracking-widest">Post to {{ course }} Channel</span>
            
            <div class="flex items-center gap-3">
              <button *ngIf="editingId" (click)="resetForm()" class="px-6 py-3 text-slate-400 font-bold text-xs uppercase hover:text-rose-500 transition">Cancel</button>
              <button (click)="editingId ? updateAnnouncement() : addAnnouncement()"
                class="px-10 py-4 bg-orange-600 hover:bg-slate-900 text-white rounded-2xl font-black text-sm transition-all duration-300 shadow-xl shadow-orange-100 active:scale-95">
                {{ editingId ? 'Update Notice' : 'Post Now' }}
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="space-y-10 relative">
      <div class="absolute left-6 top-0 bottom-0 w-[1px] bg-slate-100 -z-10"></div>

      <div *ngFor="let a of announcements" class="group relative bg-white border border-slate-200/60 p-8 rounded-[2rem] hover:shadow-xl transition-all duration-500 flex flex-col md:flex-row gap-6">
        
        <div class="absolute -right-4 top-1/2 -translate-y-1/2 flex flex-col gap-2 opacity-0 group-hover:opacity-100 transition-all translate-x-2 group-hover:translate-x-0 z-10">
          <button (click)="editAnnouncement(a)" class="w-10 h-10 bg-white border border-slate-200 rounded-full flex items-center justify-center text-slate-400 hover:text-orange-500 hover:border-orange-200 shadow-lg transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
          </button>
          <button (click)="deleteAnnouncement(a._id)" class="w-10 h-10 bg-white border border-slate-200 rounded-full flex items-center justify-center text-slate-400 hover:text-rose-600 hover:border-rose-200 shadow-lg transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
          </button>
        </div>

        <div class="flex-1">
          <div class="flex items-center gap-3 mb-4">
            <h4 class="text-2xl font-black text-slate-900 leading-tight">{{ a.title }}</h4>
          </div>
          <p class="text-slate-500 font-medium text-lg leading-relaxed mb-6">{{ a.message }}</p>
          
          <div class="flex items-center gap-4 text-[10px] font-black uppercase tracking-widest text-slate-300 border-t border-slate-50 pt-6">
            <span class="px-2 py-1 bg-slate-50 rounded-lg text-slate-400"># {{ course }}</span>
            <span class="flex items-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              Recently Posted
            </span>
          </div>
        </div>
      </div>

      <div *ngIf="announcements.length === 0" class="py-24 text-center bg-slate-50 rounded-[3rem] border-2 border-dashed border-slate-200">
        <p class="text-slate-400 font-bold uppercase tracking-widest text-xs">The megaphone is quiet...</p>
      </div>
    </div>
  </div>
</div>
