<div class="lecture-viewport">
  
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="interface-wrapper">
    <header class="glass-header">
      <div class="title-area">
        <h1>Academic <span>Lectures</span></h1>
        <p>Session 2026 • {{ filteredLectures.length }} Resources Available</p>
      </div>

      <div class="filter-controls">
        <div class="search-pill">
          <span class="search-icon">🔍</span>
          <input
            type="text"
            placeholder="Search lectures..."
            [(ngModel)]="searchText"
            (input)="applyFilter()"
          >
        </div>

        <div class="select-pill">
          <select [(ngModel)]="selectedSubject" (change)="applyFilter()">
            <option value="">All Subjects</option>
            <option *ngFor="let s of subjects" [value]="s">{{ s }}</option>
          </select>
        </div>
      </div>
    </header>

    <div class="status-box" *ngIf="loading">
      <div class="pulse-loader"></div>
      <p>Syncing curriculum...</p>
    </div>

    <div class="status-box" *ngIf="!loading && filteredLectures.length === 0">
      <span class="empty-icon">📂</span>
      <p>No matches found for your search.</p>
    </div>

    <main class="lecture-grid" *ngIf="!loading && filteredLectures.length > 0">
      <div class="lecture-card" *ngFor="let lec of filteredLectures">
        
        <div class="card-top">
          <span class="type-tag" [attr.data-type]="lec.type">
            {{ lec.type }}
          </span>
          <span class="subject-tag">{{ lec.subject }}</span>
        </div>

        <div class="card-body">
          <div class="icon-sphere">
            <span *ngIf="lec.type === 'video'">🎥</span>
            <span *ngIf="lec.type === 'pdf'">📄</span>
            <span *ngIf="lec.type === 'ppt'">📊</span>
          </div>
          <h3>{{ lec.title }}</h3>
          <div class="faculty-info">
            <div class="avatar-mini"></div>
            <p>Prof. {{ lec.faculty }}</p>
          </div>
        </div>

        <div class="card-footer">
          <a [href]="lec.fileUrl" target="_blank" class="btn-open">
            Open Resource
            <span class="arrow">→</span>
          </a>
        </div>

      </div>
    </main>
  </div>
</div>
