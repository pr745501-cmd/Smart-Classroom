<div class="viewport-bg">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="announcement-viewport">
  <header class="header-section">
    <div class="title-group">
      <h1>Announcements</h1>
      <p>Academic Year 2026 • Updates & Alerts</p>
    </div>

    <div class="search-container">
      <span>🔍</span>
      <input type="text" placeholder="Search updates..." [(ngModel)]="searchText" class="search-input">
    </div>
  </header>

  <div class="announcement-list">
    <div *ngFor="let a of filteredAnnouncements" class="card">
      <h3 class="card-title">{{ a.title }}</h3>
      <p class="card-body">{{ a.message }}</p>
      
      <div class="card-footer">
        <div class="faculty-pill">
          <div class="avatar-mini">{{ a.faculty.charAt(0) }}</div>
          <span>{{ a.faculty }}</span>
        </div>
        <span class="timestamp">
          📅 {{ a.createdAt | date:'mediumDate' }} • {{ a.createdAt | date:'shortTime' }}
        </span>
      </div>
    </div>
  </div>
</div>
